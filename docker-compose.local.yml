volumes:
  plantilla_django_react_local_postgres_data: {}
  plantilla_django_react_local_postgres_data_backups: {}
  plantilla_django_react_local_redis_data: {}

services:
  django: &django
    build:
      context: ./backend
      dockerfile: ./compose/local/django/Dockerfile
    image: plantilla_django_react_local_django
    container_name: plantilla_django_react_local_django
    depends_on:
      - pgbouncer
      - redis
    volumes:
      - /app/.venv
      - ./backend:/app:z
    env_file:
      - ./backend/.envs/.local/.django
      - ./backend/.envs/.local/.postgres
    ports:
      - '8000:8000'
    command: /start

  postgres:
    build:
      context: ./backend
      dockerfile: ./compose/production/postgres/Dockerfile
    image: plantilla_django_react_production_postgres
    container_name: plantilla_django_react_local_postgres
    volumes:
      - plantilla_django_react_local_postgres_data:/var/lib/postgresql/18/docker
      - plantilla_django_react_local_postgres_data_backups:/backups
    env_file:
      - ./backend/.envs/.local/.postgres

  pgbouncer:
    build:
      context: ./backend
      dockerfile: ./compose/production/pgbouncer/Dockerfile
    image: plantilla_django_react_local_pgbouncer
    container_name: plantilla_django_react_local_pgbouncer
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./backend/.envs/.local/.postgres
    ports:
      - '6432:6432'

  redis:
    image: docker.io/redis:7.2
    container_name: plantilla_django_react_local_redis
    volumes:
      - plantilla_django_react_local_redis_data:/data

  celeryworker:
    <<: *django
    image: plantilla_django_react_local_celeryworker
    container_name: plantilla_django_react_local_celeryworker
    depends_on:
      - pgbouncer
      - redis
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: plantilla_django_react_local_celerybeat
    container_name: plantilla_django_react_local_celerybeat
    depends_on:
      - pgbouncer
      - redis
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    image: plantilla_django_react_local_flower
    container_name: plantilla_django_react_local_flower
    depends_on:
      - pgbouncer
      - redis
    ports:
      - '5555:5555'
    command: /start-flower

  frontend:
    build:
      context: ./frontend
      dockerfile: ./compose/local/Dockerfile
    image: plantilla_django_react_local_frontend
    container_name: plantilla_django_react_local_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    ports:
      - '5173:5173'
    depends_on:
      - django
    restart: unless-stopped
